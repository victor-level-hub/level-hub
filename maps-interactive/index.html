<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LEVEL · Mapa — Gridlock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Black+Ops+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="map.css" />
<!-- v2.79.0: React vendorizado localmente (vendor/) + app.js pré-transpilado (esbuild).
     Zero dependência de CDN externo em runtime → carrega mesmo atrás de firewall corporativo. -->
<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="ds-bundle.js"></script>
<script src="gridlock-map.js"></script>
<script src="poi-data.js"></script>
<script src="image-slot.js"></script>
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
<script>
  (function () {
    var root = document.getElementById('root');
    try {
      var App = window.MapasInterativo;
      if (!window.React || !window.ReactDOM || typeof App !== 'function') throw new Error('libs/app não carregaram');
      var full = new URLSearchParams(location.search).get('full') === '1';
      window.ReactDOM.createRoot(root).render(window.React.createElement(App, { full: full }));
      // avisa o Hub (pai) que montou — desarma o watchdog do overlay
      try { if (window.parent && window.parent !== window) window.parent.postMessage({ type: 'level:map-mounted' }, '*'); } catch (pe) {}
    } catch (e) {
      if (root) root.innerHTML =
        '<div style="padding:48px 24px;max-width:520px;margin:60px auto;text-align:center;font-family:system-ui,sans-serif;color:#AEC7E0">' +
          '<div style="font-size:34px;margin-bottom:8px">🗺️</div>' +
          '<h2 style="color:#FF9800;font-size:18px;margin:0 0 8px">Não foi possível carregar o mapa interativo</h2>' +
          '<p style="font-size:13px;line-height:1.5">Tenta recarregar a página. Se persistir, a tua rede pode estar a bloquear algum recurso.</p>' +
          '<pre style="color:#8497B8;font-size:11px;white-space:pre-wrap">' + ((e && e.message) || e) + '</pre>' +
        '</div>';
    }
  })();
</script>
</body>
</html>
